name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to upload artifacts to"
        required: true
        type: string

permissions:
  contents: write

jobs:
  app:
    name: Tauri app (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Collect installers
        shell: pwsh
        run: |
          $stage = "release-stage"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          $bundle = "target/release/bundle"
          if (Test-Path "$bundle/msi") {
            Get-ChildItem "$bundle/msi" -File | Where-Object { $_.Extension -in '.msi','.zip','.sig' } | ForEach-Object {
              Copy-Item $_.FullName $stage
            }
          }
          if (Test-Path "$bundle/nsis") {
            Get-ChildItem "$bundle/nsis" -File | Where-Object { $_.Extension -in '.exe','.zip','.sig' } | ForEach-Object {
              Copy-Item $_.FullName $stage
            }
          }
          Get-ChildItem $stage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cable-app-windows
          path: release-stage/*

      - name: Determine release tag
        id: tag
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'release') {
            "tag=${{ github.event.release.tag_name }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "tag=${{ inputs.tag }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: release-stage/*
          fail_on_unmatched_files: false

  driver:
    name: Driver (CableAudio.sys)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install Windows Driver Kit
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          # Try the Win11 24H2 (10.0.26100) WDK first to match the SDK preinstalled
          # on windows-2025 runners; fall back to 22621 if that fails.
          $candidates = @(
            "https://go.microsoft.com/fwlink/?linkid=2272234",
            "https://go.microsoft.com/fwlink/?linkid=2196230"
          )
          $installer = "$env:RUNNER_TEMP\wdksetup.exe"
          $installed = $false
          foreach ($url in $candidates) {
            try {
              Write-Host "Downloading WDK from $url ..."
              Invoke-WebRequest -Uri $url -OutFile $installer -UseBasicParsing
              $proc = Start-Process -FilePath $installer -ArgumentList "/quiet","/norestart","/features","+" -Wait -PassThru
              Write-Host "WDK installer exit code: $($proc.ExitCode)"
              if ($proc.ExitCode -eq 0 -or $proc.ExitCode -eq 3010) {
                $installed = $true
                break
              }
            } catch {
              Write-Host "WDK install attempt failed: $_"
            }
          }
          if (-not $installed) {
            throw "Failed to install the Windows Driver Kit."
          }

          # wdksetup integrates the WDK MSBuild targets and VSIX into every VS 2022
          # instance it finds. We re-run VSIXInstaller defensively, but tolerate
          # exit code 1001 (already installed) which is the expected response
          # immediately after a successful wdksetup run.
          $vsixDir = "${env:ProgramFiles(x86)}\Windows Kits\10\Vsix"
          if (-not (Test-Path $vsixDir)) {
            $vsixDir = "${env:ProgramFiles}\Windows Kits\10\Vsix"
          }
          if (Test-Path $vsixDir) {
            $vsixFiles = Get-ChildItem $vsixDir -Filter "*.vsix" -Recurse -ErrorAction SilentlyContinue
            Write-Host "Found $($vsixFiles.Count) WDK VSIX file(s)."
            $vsInstalls = @(
              "${env:ProgramFiles}\Microsoft Visual Studio\2022\Enterprise",
              "${env:ProgramFiles}\Microsoft Visual Studio\2022\Professional",
              "${env:ProgramFiles}\Microsoft Visual Studio\2022\Community",
              "${env:ProgramFiles}\Microsoft Visual Studio\2022\BuildTools",
              "${env:ProgramFiles(x86)}\Microsoft Visual Studio\2022\BuildTools"
            ) | Where-Object { Test-Path "$_\Common7\IDE\VSIXInstaller.exe" }
            foreach ($vs in $vsInstalls) {
              $vsixInstaller = "$vs\Common7\IDE\VSIXInstaller.exe"
              foreach ($vsix in $vsixFiles) {
                Write-Host "Installing $($vsix.Name) into $vs ..."
                & $vsixInstaller /quiet /admin $vsix.FullName | Out-Host
                $code = $LASTEXITCODE
                Write-Host "VSIXInstaller exit code: $code"
                if ($code -ne 0 -and $code -ne 1001) {
                  Write-Host "::warning::VSIXInstaller returned $code for $($vsix.FullName)"
                }
              }
            }
          } else {
            Write-Host "No WDK VSIX directory found under Windows Kits\10\Vsix"
          }

          # Verify the kernel-mode toolset is registered with at least one VS install.
          $toolsetFound = $false
          foreach ($vs in @(
              "${env:ProgramFiles}\Microsoft Visual Studio\2022\Enterprise",
              "${env:ProgramFiles}\Microsoft Visual Studio\2022\Professional",
              "${env:ProgramFiles}\Microsoft Visual Studio\2022\Community",
              "${env:ProgramFiles}\Microsoft Visual Studio\2022\BuildTools",
              "${env:ProgramFiles(x86)}\Microsoft Visual Studio\2022\BuildTools"
            )) {
            $toolset = "$vs\MSBuild\Microsoft\VC\v170\Platforms\x64\PlatformToolsets\WindowsKernelModeDriver10.0"
            if (Test-Path $toolset) {
              Write-Host "Found WindowsKernelModeDriver10.0 toolset at: $toolset"
              $toolsetFound = $true
            }
          }
          if (-not $toolsetFound) {
            Write-Host "::warning::WindowsKernelModeDriver10.0 toolset directory not found in any VS 2022 install. The driver build will likely fail."
          }

          # Reset PowerShell's last exit code so a benign 1001 from VSIXInstaller
          # doesn't fail this step.
          $global:LASTEXITCODE = 0

      - name: Build driver
        shell: pwsh
        run: |
          .\scripts\build.ps1 -Target Driver -Configuration Release

      - name: Upload MSBuild log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: driver-msbuild-binlog
          path: driver/msbuild.binlog
          if-no-files-found: ignore

      - name: Stage driver artifacts
        id: stage
        if: success()
        shell: pwsh
        continue-on-error: true
        run: |
          $stage = "driver-stage"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          $pkg = "driver/x64/Release/package"
          if (-not (Test-Path $pkg)) {
            Write-Host "No driver package directory found; skipping."
            "produced=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            exit 0
          }
          $zip = "$stage/CableAudio-driver-x64.zip"
          Compress-Archive -Path "$pkg/*" -DestinationPath $zip -Force
          Get-ChildItem $stage
          "produced=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload artifact
        if: steps.stage.outputs.produced == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cable-driver-windows
          path: driver-stage/*

      - name: Determine release tag
        id: tag
        if: steps.stage.outputs.produced == 'true'
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'release') {
            "tag=${{ github.event.release.tag_name }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "tag=${{ inputs.tag }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Upload to release
        if: steps.stage.outputs.produced == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: driver-stage/*
          fail_on_unmatched_files: false
